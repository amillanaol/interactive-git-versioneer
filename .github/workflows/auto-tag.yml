name: interactive-git-versioneer Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package
        run: pip install -e .

      - name: Run auto-tagger (Conventional Commits - no API key needed)
        run: python -m interactive_git_versioneer.main tag --auto --dry-run

      - name: Create and push tags
        if: success()
        run: python -m interactive_git_versioneer.main tag --auto --push
